# .github/workflows/vercel-checks.yml
name: Vercel Safety Checks

on:
  repository_dispatch:
    types: [vercel.deployment.ready]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      
      - run: pnpm ci
      - run: pnpm lint && pnpm test
      
      - name: Vercel Check ✅
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "Vercel Safety Check"
